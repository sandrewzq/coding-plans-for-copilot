<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src https://fonts.gstatic.com; connect-src 'self'; img-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';">
  <title>编码套餐看板 · AI 模型定价一览</title>
  <meta name="description" content="实时汇总智谱、Kimi、火山引擎、MiniMax、阿里云等主流 AI 供应商的编程套餐价格，自动抓取更新。" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="编码套餐看板 · AI 模型定价一览" />
  <meta property="og:description" content="实时汇总智谱、Kimi、火山引擎、MiniMax、阿里云等主流 AI 供应商的编程套餐价格，自动抓取更新。" />
  <meta property="og:url" content="https://sandrewzq.github.io/coding-plans-for-copilot/" />
  <link rel="icon" href="./icons.svg#icon-app" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
  <script defer src="./app.js"></script>
</head>

<body>
  <div class="backdrop"></div>
  <main class="page">
    <div class="page-layout">
      <aside class="sidebar" aria-label="供应商导航">
        <div class="sidebar-card">
          <h2>供应商</h2>
          <nav class="sidebar-nav">
            <ul id="providerNav" class="sidebar-list"></ul>
          </nav>
        </div>
      </aside>

      <div class="page-content">
        <header class="hero">
          <p class="eyebrow">GitHub Pages · 自动抓取</p>
          <h1>编码套餐看板</h1>
          <p class="subtitle">仅展示各供应商公开页面可解析到的标准月费与备注信息。</p>
          <div class="hero-actions">
            <a class="hero-link" href="https://github.com/sandrewzq/coding-plans-for-copilot" target="_blank"
              rel="noopener noreferrer">
              查看本工程（GitHub）
            </a>
          </div>
          <div class="stats" id="stats">
            <span>生成时间：<strong id="generatedAt">加载中</strong></span>
            <span>提供商：<strong id="providerCount">0</strong></span>
            <span>套餐数：<strong id="planCount">0</strong></span>
          </div>
        </header>

        <section class="toolbar">
          <div class="toolbar-filters">
            <input type="text" id="searchInput" class="search-input" placeholder="搜索套餐名称或供应商..." />
            <select id="priceFilter" class="price-filter">
              <option value="">所有价格</option>
              <option value="0-50">¥0 - ¥50</option>
              <option value="50-100">¥50 - ¥100</option>
              <option value="100-200">¥100 - ¥200</option>
              <option value="200+">¥200+</option>
            </select>
          </div>
          <div class="toolbar-actions">
            <button id="compareButton" class="btn-secondary" type="button">📊 对比套餐</button>
            <button id="themeToggle" class="btn-secondary" type="button">🌙 暗色模式</button>
            <button id="reloadButton" class="btn-primary" type="button">重新加载</button>
          </div>
        </section>

        <section id="comparePanel" class="compare-panel hidden">
          <div class="compare-header">
            <h3>套餐对比</h3>
            <button id="closeCompare" class="btn-secondary" type="button">关闭</button>
          </div>
          <div id="compareContent" class="compare-content"></div>
        </section>

        <section id="errorBanner" class="error hidden" role="status" aria-live="polite"></section>
        <section id="providerGrid" class="provider-grid" aria-live="polite"></section>
      </div>
    </div>
  </main>
</body>

</html>
