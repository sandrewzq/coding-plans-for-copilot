<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>编码套餐看板</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
  <script defer src="./app.js"></script>
</head>

<body>
  <div class="backdrop"></div>
  <main class="page">
    <header class="hero">
      <p class="eyebrow">GitHub Pages · 自动抓取</p>
      <h1>编码套餐看板</h1>
      <p class="subtitle">仅展示各供应商公开页面可解析到的标准月费与备注信息。</p>
      <div class="hero-actions">
        <a class="hero-link" href="https://github.com/sandrewzq/coding-plans-for-copilot" target="_blank"
          rel="noopener noreferrer">
          查看本工程（GitHub）
        </a>
      </div>
      <div class="stats" id="stats">
        <span>生成时间：<strong id="generatedAt">加载中</strong></span>
        <span>提供商：<strong id="providerCount">0</strong></span>
        <span>套餐数：<strong id="planCount">0</strong></span>
      </div>
    </header>

    <section class="toolbar">
      <p>筛选规则：仅标准月费（不含年费、季费与首月特惠价）。</p>
      <button id="reloadButton" type="button">重新加载</button>
    </section>

    <section id="errorBanner" class="error hidden" role="status" aria-live="polite"></section>
    <section id="providerGrid" class="provider-grid" aria-live="polite"></section>
  </main>
</body>

</html>
