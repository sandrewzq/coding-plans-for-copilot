name: Update Provider Pricing

on:
  schedule:
    # 北京时间 8:00 和 20:00 (UTC 0:00 和 12:00)
    - cron: "0 0,12 * * *"
  push:
    paths:
      - "scripts/**"
  workflow_dispatch:

jobs:
  update-pricing:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect workflow file changes
        id: workflow_changes
        run: |
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            if git diff --name-only HEAD^ HEAD | grep -q "^\.github/workflows/update-pricing\.yml$"; then
              echo "has_workflow_change=true" >> "$GITHUB_OUTPUT"
            else
              echo "has_workflow_change=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "has_workflow_change=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch latest provider pricing
        run: npm run pricing:fetch

      - name: Detect provider parsing failures
        id: provider_failures
        run: |
          node -e "
          const fs = require('node:fs');
          const data = JSON.parse(fs.readFileSync('docs/provider-pricing.json', 'utf8'));
          const failures = Array.isArray(data.failures) ? data.failures : [];
          
          // Provider ID to display name mapping
          const providerNames = {
            'aliyun-ai': '阿里云百炼',
            'baidu-qianfan-ai': '百度智能云千帆',
            'compshare-ai': '优云智算',
            'infini-ai': '无问芯穹',
            'kimi-ai': 'Kimi',
            'kwaikat-ai': '快手 KwaiKAT',
            'minimax-ai': 'MiniMax',
            'mthreads-ai': '摩尔线程',
            'volcengine-ai': '火山引擎',
            'x-aio': 'X-AIO',
            'zenmux-ai': 'Zenmux',
            'zhipu-ai': '智谱 z.ai'
          };
          
          // Extract provider ID from failure message
          function extractProviderId(message) {
            const match = message.match(/^([^:]+):/);
            return match ? match[1].trim() : null;
          }
          
          const providerFailures = failures.map(msg => {
            const providerId = extractProviderId(msg);
            return {
              providerId,
              providerName: providerNames[providerId] || providerId,
              message: msg
            };
          }).filter(f => f.providerId);
          
          const out = process.env.GITHUB_OUTPUT;
          fs.appendFileSync(out, 'has_failures=' + (providerFailures.length > 0) + '\n');
          fs.appendFileSync(out, 'failure_count=' + providerFailures.length + '\n');
          fs.appendFileSync(out, 'failures_json=' + JSON.stringify(JSON.stringify(providerFailures)) + '\n');
          "

      - name: Log provider parsing failures
        if: steps.provider_failures.outputs.has_failures == 'true'
        uses: actions/github-script@v7
        env:
          FAILURES_JSON: ${{ steps.provider_failures.outputs.failures_json }}
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const failures = JSON.parse(process.env.FAILURES_JSON || '[]');
            
            core.warning(`发现 ${failures.length} 个提供商抓取失败:`);
            for (const failure of failures) {
              const providerId = failure.providerId;
              const providerName = failure.providerName;
              const failureMessage = failure.message;
              core.warning(`- ${providerName} (${providerId}): ${failureMessage}`);
            }
            core.info(`工作流运行: ${runUrl}`);

      - name: Upload pricing data as artifact
        uses: actions/upload-artifact@v4
        with:
          name: pricing-data
          path: |
            docs/provider-pricing.json
            docs/price-history.json
          retention-days: 7
